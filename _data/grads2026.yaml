  - name: "Eve Fleisig"
    email: "efleisig@berkeley.edu"
    website: "https://efleisig.com"
    advisors: "Dan Klein"
    img: "eve-fleisig.jpg"
    blurb: "I design language models to work reliably and fairly for the broad range of real LLM users. First, my research leverages disagreement among user preferences as signal, in order to train and evaluate LLMs for entire populations of users. Second, I work on designing rigorous evaluations to extricate challenging LLM harms that diverse users face. Finally, I work on core technical failures of LLMs, like miscalibrated confidence, to reduce downstream risks when models are deployed to users with different needs. Combined, these interventions facilitate building LLMs that minimize societal harms, and maximize benefits to a wider range of real-world users."
    looking: false
    next: "Postdoctoral fellow at Princeton CITP"

