    img: "melissa-pan.jpg"
    blurb: "Agentic AI promises powerful real-world automation but risks unsustainable energy use, especially as inference dominates cloud workloads and test-time scaling multiplies costs. My research addresses the poorly understood energy cost-accuracy trade-off through co-design of ML algorithms and systems for multi-component AI pipelines."
