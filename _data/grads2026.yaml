  - name: "J.D. Zamfirescu-Pereira"
    email: "zamfi@berkeley.edu"
    website: "https://zamfi.net"
    advisors: "Bjoern Hartmann"
    img: "j-d-zamfirescu-pereira.jpg"
    blurb: "My research focuses on effective human-AI co-design. I study the boundaries of language interfaces as a medium for interacting with AI, creating systems that blend language-focused interactions with structured user interfaces that draw on different levels of abstraction. I focus on language-oriented technologies, like LLMs and text-to-image models, that are powerful mediators of design processes. These technologies enable humans to describe their desires at almost any level of abstraction, from high-level goals vaguely specified (“I’d like a game to help my kid learn to read”) to low-level corrections of undesired outputs (“Don’t say ‘I know because I’ve tasted it’ when about a recipe substitution's taste”)."
    looking: false
    next: "Assistant Professor, Computer Science, UCLA"

