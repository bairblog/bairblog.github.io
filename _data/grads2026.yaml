  - name: "Qiyang Li"
    email: "qcli@berkeley.edu"
    website: "https://colinqiyangli.github.io/"
    advisors: "Sergey Levine"
    img: "qiyang-li.jpg"
    blurb: "Recent progress in robotic manipulation policy learning has been largely driven by (1) the increasing availability of large-scale prior datasets and (2) the success of action chunking, where the policy predicts a short sequence of future actions rather than a single one. However, most action chunking policies are trained via supervised imitation learning, because efficient online self-improvement with reinforcement learning (RL) remains challenging—limiting real-world applicability. My PhD research studied how we could leverage prior data to optimize action-chunking policies with RL, combining empirical results with theoretical insights."
    looking: true
    next: "Post-doc/research scientist for RL in robotics and LLMs!"

  - name: "Sampada Deglurkar"
