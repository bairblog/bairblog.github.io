  - name: "Charlie Snell"
    email: "csnell22@berkeley.edu"
    website: "https://sea-snell.github.io"
    advisors: "Dan Klein"
    img: "charlie-snell.jpg"
    blurb: "My work aims to understand when and how the different LLM scaling paradigms can be traded off and interchanged. In particular, test-time scaling treats each prompt independently, drawing long chains of inferences and then forgetting them entirely between prompts. This differs critically from pretraining, which instead learns a compressed representation from a large dataset. I believe bridging the gap between these methods of scaling computation, presents a key open challenge in the field: how can we develop methods which turn the inferences drawn at test-time back into learned representations that the model can hold onto across interactions."
    looking: false
    next: ""

