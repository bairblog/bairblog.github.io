  - name: "Michael Psenka"
    email: "psenka@berkeley.edu"
    website: "https://www.michaelpsenka.io/"
    advisors: "Aditi Krishnapriyan"
    img: "michael-psenka.jpg"
    blurb: "Work in various domains (reinforcement learning, world models, AI+bio/chem), generally working on longer-horizon and out-of-distribution problems in planning and interpolation (e.g. robot manipulation from start state to goal, molecular dynamics of proteins between ground states). My thesis took a variational approach (think calculus of variations) directly from deep generative models of the environment, framing path-finding as minimizing a functional induced by the learned model itself (its score, its critic, or its dynamics). Through my research I've gained insight on how to properly handle dynamics in deep learning systems, and I plan to continue developing systems that are dynamic and adaptive."
    looking: false
    next: "Lead Research Scientist at Baseten"

