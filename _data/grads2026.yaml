  - name: "Maulik Bhatt"
    email: "maulikbhatt@berkeley.edu"
    website: "https://maulikb.com"
    advisors: "Negar Mehr"
    img: "maulik-bhatt.jpg"
    blurb: "My research develops autonomous robots that can safely coordinate with humans and other robots in shared environments. I build scalable algorithms grounded in game theory and diffusion models that let agents reason about the intent and behavior of others around them. My work spans real-time multi-agent trajectory planning and imitation learning in the presence of multi-modality. I've validated these methods on hardware platforms ranging from quadrotors to manipulators, with the goal of making multi-agent coordination robust, interpretable, and deployable in the real world."
    looking: false
    next: "Joining Toyota Woven's end-to-end autonomous driving team."

  - name: "Melissa Pan"
