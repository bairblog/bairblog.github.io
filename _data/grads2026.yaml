  - name: "Yigit Efe Erginbas"
    email: "erginbas@berkeley.edu"
    website: "https://www.linkedin.com/in/erginbas/"
    advisors: "Kannan Ramchandran, Thomas A. Courtade"
    img: "yigit-efe-erginbas.jpg"
    blurb: "My PhD research spans two threads: online learning in large-scale markets, and interpretability of large machine learning models. In the first, I work on sequential decision-making with applications to recommendation, pricing, and assortment selection. My focus is on designing algorithms with provable guarantees for welfare maximization, revenue maximization, and stability. In the second, I develop scalable attribution methods that exploit the sparse, low-degree structure of real-world interactions, using tools from signal processing and information theory. More recently, I have been exploring principled ways to evaluate the faithfulness of model self-explanations."
    looking: false
    next: "Researcher at Hudson River Trading's AI Labs (HAIL)"

  - name: "Yiheng Li"
    email: "yhli@berkeley.edu"
